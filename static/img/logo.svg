<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="AubeVideo">
  <defs>
    <radialGradient id="sun" cx="42%" cy="36%" r="72%">
      <stop offset="0" stop-color="#ffe39a"/>
      <stop offset="0.5" stop-color="#f7b545"/>
      <stop offset="1" stop-color="#e8851c"/>
    </radialGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffcf6b"/>
      <stop offset="1" stop-color="#f2a02e"/>
    </linearGradient>
  </defs>

  <!-- Rayons du soleil (12, tournés autour du centre) -->
  <g fill="url(#ray)">
    <polygon points="32,1.5 29.6,12 34.4,12" transform="rotate(0 32 32)"/>
    <polygon points="32,1.5 29.6,12 34.4,12" transform="rotate(30 32 32)"/>
    <polygon points="32,1.5 29.6,12 34.4,12" transform="rotate(60 32 32)"/>
    <polygon points="32,1.5 29.6,12 34.4,12" transform="rotate(90 32 32)"/>
    <polygon points="32,1.5 29.6,12 34.4,12" transform="rotate(120 32 32)"/>
    <polygon points="32,1.5 29.6,12 34.4,12" transform="rotate(150 32 32)"/>
    <polygon points="32,1.5 29.6,12 34.4,12" transform="rotate(180 32 32)"/>
    <polygon points="32,1.5 29.6,12 34.4,12" transform="rotate(210 32 32)"/>
    <polygon points="32,1.5 29.6,12 34.4,12" transform="rotate(240 32 32)"/>
    <polygon points="32,1.5 29.6,12 34.4,12" transform="rotate(270 32 32)"/>
    <polygon points="32,1.5 29.6,12 34.4,12" transform="rotate(300 32 32)"/>
    <polygon points="32,1.5 29.6,12 34.4,12" transform="rotate(330 32 32)"/>
  </g>

  <!-- Disque solaire -->
  <circle cx="32" cy="32" r="15" fill="url(#sun)"/>

  <!-- Play au centre -->
  <path d="M27 23.5 L43 32 L27 40.5 Z" fill="#fff" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/>
</svg>
