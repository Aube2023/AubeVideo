{% extends "base.html" %}
{% block title %}Mot de passe oublié — AubeVideo{% endblock %}
{% block content %}

<div class="auth-card">
  <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="" class="auth-logo">
  <h1>Mot de passe oublié</h1>
  <p class="auth-sub">Entrez votre e-mail : nous vous enverrons un lien pour choisir un nouveau mot de passe.</p>

  <form method="post" class="auth-form">
    <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
    <label class="field">
      <span>E-mail</span>
      <input type="email" name="email" autofocus required autocomplete="email" placeholder="vous@exemple.com">
    </label>
    <button type="submit" class="btn btn-primary btn-lg btn-block">Envoyer le lien</button>
  </form>

  <div class="auth-foot">
    <a href="{{ url_for('login') }}">Retour à la connexion</a>
  </div>
</div>

{% endblock %}
