{% extends "base.html" %}
{% block title %}Nouveau mot de passe — AubeVideo{% endblock %}
{% block content %}

<div class="auth-card">
  <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="" class="auth-logo">
  <h1>Nouveau mot de passe</h1>
  <p class="auth-sub">Choisissez un nouveau mot de passe pour votre compte.</p>

  <form method="post" class="auth-form">
    <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
    <label class="field">
      <span>Nouveau mot de passe</span>
      <input type="password" name="password" required minlength="8" autofocus
             autocomplete="new-password" placeholder="Au moins 8 caractères">
    </label>
    <label class="field">
      <span>Confirmer le mot de passe</span>
      <input type="password" name="password2" required minlength="8"
             autocomplete="new-password" placeholder="Retapez le mot de passe">
    </label>
    <button type="submit" class="btn btn-primary btn-lg btn-block">Mettre à jour</button>
  </form>
</div>

{% endblock %}
