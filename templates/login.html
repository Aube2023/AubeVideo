{% extends "base.html" %}
{% block title %}Connexion — AubeVideo{% endblock %}
{% block content %}

<div class="auth-card">
  <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="" class="auth-logo">
  <h1>Connexion à AubeVideo</h1>
  <p class="auth-sub">Avec votre compte <strong>AubeMail</strong> (e-mail + mot de passe) ou votre compte AubeVideo.</p>

  <form method="post" class="auth-form">
    <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
    <label class="field">
      <span>E-mail ou nom d'utilisateur</span>
      <input type="text" name="username" autofocus required autocomplete="username">
    </label>
    <label class="field">
      <span>Mot de passe</span>
      <input type="password" name="password" required autocomplete="current-password">
    </label>
    <button type="submit" class="btn btn-primary btn-lg btn-block">Se connecter</button>
  </form>

  <div class="auth-foot" style="margin-top:14px">
    <a href="{{ url_for('forgot_password') }}">Mot de passe oublié ?</a>
  </div>
  <div class="auth-foot">
    <span>Pas encore de compte ?</span>
    <a href="{{ url_for('register', next=request.args.get('next','')) }}"><strong>Créer un compte</strong></a>
  </div>
</div>

{% endblock %}
