{% extends "base.html" %}
{% block title %}Code 2FA — AubeVideo{% endblock %}
{% block content %}
<div class="auth-card">
  <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="" class="auth-logo">
  <h1>🔐 Code 2FA</h1>
  <p class="auth-sub">Entrez le code à 6 chiffres affiché dans votre application d'authentification.</p>
  <form method="post" class="auth-form">
    <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
    <label class="field">
      <span>Code</span>
      <input type="text" name="code" maxlength="6" inputmode="numeric" pattern="[0-9]{6}"
             autofocus required autocomplete="one-time-code">
    </label>
    <button type="submit" class="btn btn-primary btn-lg btn-block">Vérifier</button>
  </form>
</div>
{% endblock %}
